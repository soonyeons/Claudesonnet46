name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - run: npm install
      
      - run: npm run build
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      
      - uses: actions/deploy-pages@v4
```

